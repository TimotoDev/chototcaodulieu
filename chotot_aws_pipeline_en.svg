<svg width="100%" viewBox="0 0 760 780" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- TRIGGER ROW                                                -->
<!-- ══════════════════════════════════════════════════════════ -->

<!-- Initial full run -->
<g>
  <rect x="40" y="32" width="210" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="145" y="54" text-anchor="middle" dominant-baseline="central" fill="#444441" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Initial full run</text>
  <text x="145" y="74" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A" font-family="system-ui,sans-serif" font-size="11">Manual · EC2 t3.micro · ~60k listings</text>
</g>

<!-- Daily cron -->
<g>
  <rect x="510" y="32" width="210" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="615" y="54" text-anchor="middle" dominant-baseline="central" fill="#444441" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Daily cron</text>
  <text x="615" y="74" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A" font-family="system-ui,sans-serif" font-size="11">EventBridge · cron(0 1 * * ? *) · Lambda</text>
</g>

<!-- merge lines -->
<line x1="145" y1="88" x2="145" y2="126" stroke="#737268" stroke-width="1.5"/>
<line x1="615" y1="88" x2="615" y2="126" stroke="#737268" stroke-width="1.5"/>
<line x1="145" y1="126" x2="615" y2="126" stroke="rgba(31,30,29,0.3)" stroke-width="1"/>
<line x1="380" y1="126" x2="380" y2="158" stroke="#737268" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- SCRAPER                                                    -->
<!-- ══════════════════════════════════════════════════════════ -->
<g>
  <rect x="160" y="158" width="440" height="58" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="380" y="179" text-anchor="middle" dominant-baseline="central" fill="#3C3489" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Python scraper (chotot.py)</text>
  <text x="380" y="199" text-anchor="middle" dominant-baseline="central" fill="#534AB7" font-family="system-ui,sans-serif" font-size="11">63 provinces · checkpoint every 50 pages · retry on 429 / network error</text>
</g>

<line x1="380" y1="216" x2="380" y2="258" stroke="#737268" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- PARSE / CLEAN / DEDUP                                      -->
<!-- ══════════════════════════════════════════════════════════ -->
<g>
  <rect x="160" y="258" width="440" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="380" y="278" text-anchor="middle" dominant-baseline="central" fill="#085041" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Parse · clean · dedup</text>
  <text x="380" y="298" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" font-family="system-ui,sans-serif" font-size="11">Map IDs → labels · strip illegal chars · deduplicate by list_id</text>
</g>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- MODE SPLIT: full vs incremental label                      -->
<!-- ══════════════════════════════════════════════════════════ -->
<!-- Left branch: full → S3 + DynamoDB -->
<path d="M380 314 L380 350 L195 350 L195 390" fill="none" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Right branch: incremental → DynamoDB dedup check -->
<path d="M380 314 L380 350 L565 350 L565 390" fill="none" stroke="rgba(31,30,29,0.3)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- branch labels -->
<text x="260" y="345" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">full run</text>
<text x="490" y="345" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">incremental</text>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- AWS DASHED CONTAINER                                       -->
<!-- ══════════════════════════════════════════════════════════ -->
<rect x="40" y="376" width="680" height="340" rx="12" fill="none" stroke="rgba(31,30,29,0.25)" stroke-width="1" stroke-dasharray="5 4"/>
<text x="60" y="394" font-family="system-ui,sans-serif" font-size="11" fill="#737268">AWS  (ap-southeast-1)</text>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- S3 bucket                                                  -->
<!-- ══════════════════════════════════════════════════════════ -->
<g>
  <rect x="60" y="390" width="230" height="92" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="175" y="415" text-anchor="middle" dominant-baseline="central" fill="#633806" font-family="system-ui,sans-serif" font-size="13" font-weight="600">S3 — CSV Archive</text>
  <text x="175" y="435" text-anchor="middle" dominant-baseline="central" fill="#854F0B" font-family="system-ui,sans-serif" font-size="11">Bucket: chotot-xe-may-data</text>
  <text x="175" y="452" text-anchor="middle" dominant-baseline="central" fill="#854F0B" font-family="system-ui,sans-serif" font-size="11">Key: xe-may/YYYY-MM-DD.csv</text>
  <text x="175" y="469" text-anchor="middle" dominant-baseline="central" fill="#854F0B" font-family="system-ui,sans-serif" font-size="11">Athena for ad-hoc SQL · ~$0.01/mo</text>
</g>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- DynamoDB                                                   -->
<!-- ══════════════════════════════════════════════════════════ -->
<g>
  <rect x="460" y="390" width="230" height="92" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="575" y="415" text-anchor="middle" dominant-baseline="central" fill="#0C447C" font-family="system-ui,sans-serif" font-size="13" font-weight="600">DynamoDB</text>
  <text x="575" y="435" text-anchor="middle" dominant-baseline="central" fill="#185FA5" font-family="system-ui,sans-serif" font-size="11">Table: chotot-xe-may · PK: list_id</text>
  <text x="575" y="452" text-anchor="middle" dominant-baseline="central" fill="#185FA5" font-family="system-ui,sans-serif" font-size="11">PutItem upsert · free tier (25 GB)</text>
  <text x="575" y="469" text-anchor="middle" dominant-baseline="central" fill="#185FA5" font-family="system-ui,sans-serif" font-size="11">BatchGetItem for incremental dedup</text>
</g>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- DynamoDB → Scraper feedback (incremental dedup arrow)      -->
<!-- ══════════════════════════════════════════════════════════ -->
<path d="M690 436 L716 436 L716 187 L602 187"
      fill="none" stroke="rgba(31,30,29,0.15)" stroke-width="1" stroke-dasharray="4 3"
      marker-end="url(#arrow-dash)"/>
<text x="720" y="330" text-anchor="start" font-family="system-ui,sans-serif" font-size="10" fill="#999">Already</text>
<text x="720" y="344" text-anchor="start" font-family="system-ui,sans-serif" font-size="10" fill="#999">seen?</text>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- COMPUTE — EC2 (full run)                                   -->
<!-- ══════════════════════════════════════════════════════════ -->
<g>
  <rect x="60" y="510" width="230" height="68" rx="8" fill="#FAECED" stroke="#9A3C1D" stroke-width="0.5"/>
  <text x="175" y="533" text-anchor="middle" dominant-baseline="central" fill="#712B13" font-family="system-ui,sans-serif" font-size="13" font-weight="600">EC2 t3.micro</text>
  <text x="175" y="552" text-anchor="middle" dominant-baseline="central" fill="#9A3C1D" font-family="system-ui,sans-serif" font-size="11">Full run only · no 15-min timeout</text>
  <text x="175" y="569" text-anchor="middle" dominant-baseline="central" fill="#9A3C1D" font-family="system-ui,sans-serif" font-size="11">Terminate after run · &lt;$0.01 cost</text>
</g>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- COMPUTE — Lambda (daily)                                   -->
<!-- ══════════════════════════════════════════════════════════ -->
<g>
  <rect x="460" y="510" width="230" height="68" rx="8" fill="#F2EDFC" stroke="#6B3EAC" stroke-width="0.5"/>
  <text x="575" y="533" text-anchor="middle" dominant-baseline="central" fill="#4A2880" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Lambda</text>
  <text x="575" y="552" text-anchor="middle" dominant-baseline="central" fill="#6B3EAC" font-family="system-ui,sans-serif" font-size="11">Daily incremental · 512 MB · 10 min</text>
  <text x="575" y="569" text-anchor="middle" dominant-baseline="central" fill="#6B3EAC" font-family="system-ui,sans-serif" font-size="11">Free tier · EventBridge trigger</text>
</g>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- MONITORING — CloudWatch                                    -->
<!-- ══════════════════════════════════════════════════════════ -->
<g>
  <rect x="60" y="610" width="230" height="68" rx="8" fill="#E8F4F8" stroke="#1A7F8E" stroke-width="0.5"/>
  <text x="175" y="633" text-anchor="middle" dominant-baseline="central" fill="#0D5A66" font-family="system-ui,sans-serif" font-size="13" font-weight="600">CloudWatch Logs</text>
  <text x="175" y="652" text-anchor="middle" dominant-baseline="central" fill="#1A7F8E" font-family="system-ui,sans-serif" font-size="11">Lambda execution logs</text>
  <text x="175" y="669" text-anchor="middle" dominant-baseline="central" fill="#1A7F8E" font-family="system-ui,sans-serif" font-size="11">Alarm on error rate / duration</text>
</g>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- MONITORING — SNS Alerts                                    -->
<!-- ══════════════════════════════════════════════════════════ -->
<g>
  <rect x="460" y="610" width="230" height="68" rx="8" fill="#FFF0E8" stroke="#C05A1E" stroke-width="0.5"/>
  <text x="575" y="633" text-anchor="middle" dominant-baseline="central" fill="#8B3A0F" font-family="system-ui,sans-serif" font-size="13" font-weight="600">SNS — Alerts</text>
  <text x="575" y="652" text-anchor="middle" dominant-baseline="central" fill="#C05A1E" font-family="system-ui,sans-serif" font-size="11">Email on failure or 0 new records</text>
  <text x="575" y="669" text-anchor="middle" dominant-baseline="central" fill="#C05A1E" font-family="system-ui,sans-serif" font-size="11">Topic: chotot-scrape-alerts</text>
</g>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- CONNECTING LINES (within AWS box)                          -->
<!-- ══════════════════════════════════════════════════════════ -->

<!-- EC2 → S3 (initial run writes CSV) -->
<line x1="175" y1="482" x2="175" y2="510" stroke="#737268" stroke-width="1" stroke-dasharray="3 2"/>

<!-- Lambda → DynamoDB -->
<line x1="575" y1="482" x2="575" y2="510" stroke="#737268" stroke-width="1" stroke-dasharray="3 2"/>

<!-- Lambda → S3 (also writes CSV) -->
<path d="M460 545 L310 545 L310 483" fill="none" stroke="rgba(31,30,29,0.2)" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow-dash)"/>

<!-- EC2 → DynamoDB (initial run also upserts) -->
<path d="M290 545 L430 545 L430 484" fill="none" stroke="rgba(31,30,29,0.2)" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow-dash)"/>

<!-- Lambda → CloudWatch (logs) -->
<path d="M460 562 L370 562 L370 644 L290 644" fill="none" stroke="rgba(31,30,29,0.2)" stroke-width="1" stroke-dasharray="3 2"/>

<!-- CloudWatch → SNS (alarm → notification) -->
<line x1="290" y1="644" x2="460" y2="644" stroke="rgba(31,30,29,0.3)" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow-dash)"/>
<text x="380" y="638" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#888">alarm</text>

