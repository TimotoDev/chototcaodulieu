<!-- COST SUMMARY (bottom right)                               -->
<!-- ══════════════════════════════════════════════════════════ -->
<text x="700" y="720" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#999">Est. total: &lt;$0.10/month</text>
<text x="700" y="734" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" fill="#999">S3 + DDB free tier + Lambda free tier</text>

</svg>
